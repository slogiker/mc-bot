  #   restart: unless-stopped
  #   mem_limit: 256m
  #   environment:
  #     - SECRET_KEY=${PLAYIT_SECRET_KEY}
  #   network_mode: "service:mc-bot" # Share network namespace for localhost access if needed, OR explicit link
  #   depends_on:
  #     - mc-bot
